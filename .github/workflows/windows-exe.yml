name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - main.py
      - requirements.txt
      - .github/workflows/windows-exe.yml

permissions:
  contents: read

jobs:
  build-windows-exe:
    name: Build Windows executable
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build executable
        shell: pwsh
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name SongEternal `
            --collect-all librosa `
            --collect-all sounddevice `
            main.py

      - name: Package executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force package | Out-Null
          Copy-Item dist\SongEternal.exe package\

          if (Test-Path README.md) {
            Copy-Item README.md package\
          }

          Compress-Archive -Path package\* -DestinationPath SongEternal-windows.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SongEternal-windows
          path: |
            dist/SongEternal.exe
            SongEternal-windows.zip
          if-no-files-found: error
          retention-days: 30
